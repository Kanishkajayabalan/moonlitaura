<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <title>Register Page</title>

    <style>

        body{
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg,#ff9a9e,#fecfef,#a1f0ed,#ffd6a5);
            background-attachment: fixed;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding: 20px;
        }

        .register-box{
            background:#f2f2f2;
            width:350px;
            padding:40px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        h2{
            margin-bottom:30px;
            color: #333;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
            box-sizing:border-box;
        }

        .password-box{
            position:relative;
        }

        .password-box input{
            padding-right:45px;
        }

        .password-box i{
            position:absolute;
            right:15px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            color:black;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:5px;
            background:#6a11cb;
            color:white;
            font-size:18px;
            cursor:pointer;
            margin-top:15px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #4a0b8b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(106, 17, 203, 0.3);
        }

        #message{
            margin-top:15px;
            font-size:15px;
        }

        .login-link {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .login-link a {
            color: #6a11cb;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: #4a0b8b;
            text-decoration: underline;
        }

    </style>
</head>

<body>

    <div class="register-box">

        <h2>Create Account</h2>

        <input type="text"
        id="fullname"
        placeholder="Full Name">

        <input type="email"
        id="email"
        placeholder="Email Address">

        <input type="text"
        id="username"
        placeholder="Username">

        <div class="password-box">

            <input type="password"
            id="password"
            placeholder="Enter Password">

            <!-- Eye Icon -->
            <i class="fa-solid fa-eye"
            id="eye"></i>

        </div>

        <input type="password"
        id="confirmPassword"
        placeholder="Confirm Password">

        <button id="registerBtn">Register</button>

        <p id="message"></p>

        <div class="login-link">
            Already have an account? <a onclick="goToLogin()">Login here</a>
        </div>

    </div>

    <script>

        $("#eye").click(function(){

            let password = $("#password");

            if(password.attr("type") === "password"){

                password.attr("type","text");

                $("#eye")
                .removeClass("fa-eye")
                .addClass("fa-eye-slash");
            }

            else{

                password.attr("type","password");

                $("#eye")
                .removeClass("fa-eye-slash")
                .addClass("fa-eye");
            }
        });

        $("#registerBtn").click(function(){

            let fullname = $("#fullname").val();
            let email = $("#email").val();
            let username = $("#username").val();
            let password = $("#password").val();
            let confirmPassword = $("#confirmPassword").val();

            if(fullname === "" || email === "" || username === "" || password === "" || confirmPassword === ""){

                $("#message").html("Please fill all fields");
                $("#message").css("color", "#e91e63");
            }

            else if(password !== confirmPassword){

                $("#message").html("Passwords do not match");
                $("#message").css("color", "#e91e63");
            }

            else if(password.length < 6){

                $("#message").html("Password must be at least 6 characters");
                $("#message").css("color", "#e91e63");
            }

            else{

                // Set login status
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', username);
                localStorage.setItem('email', email);
                
                $("#message").html("Registration Successful ✅");
                $("#message").css("color", "#4caf50");
                
                // Redirect to home page after 1.5 seconds
                setTimeout(function(){
                    window.location.href = 'index.html';
                }, 1500);
            }
        });

        function goToLogin(){
            window.location.href = 'login page.html';
        }

    </script>

</body>
</html>
