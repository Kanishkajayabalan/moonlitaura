<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <title>Login Page</title>

    <style>

        body{
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: url('handmade background.png') center/cover no-repeat fixed;
            background-color: #f5f5f5;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            background:rgba(255, 255, 255, 0.95);
            width:320px;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 15px 40px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        h2{
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
            box-sizing:border-box;
        }

        .password-box{
            position:relative;
        }

        .password-box input{
            padding-right:45px;
        }

        .password-box i{
            position:absolute;
            right:15px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            color:black;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:5px;
            background:#4da3f0;
            color:white;
            font-size:18px;
            cursor:pointer;
            margin-top:15px;
        }

        button:hover {
            background: #2a7fb8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(77, 163, 240, 0.3);
            transition: all 0.3s ease;
        }

        #message{
            margin-top:15px;
            font-size:15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        #message:not(:empty) {
            display: block;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .register-link {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .register-link a {
            color: #4da3f0;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .register-link a:hover {
            color: #2a7fb8;
            text-decoration: underline;
        }

    </style>
</head>

<body>

    <div class="login-box">

        <h2>Login</h2>

        <form id="loginForm" method="POST" action="login.php">
            <input type="text"
            id="username"
            name="username"
            placeholder="Username"
            required>

            <div class="password-box">

                <input type="password"
                id="password"
                name="password"
                placeholder="Enter Password"
                required>

                <!-- Eye Icon -->
                <i class="fa-solid fa-eye"
                id="eye"></i>

            </div>

            <button type="submit" id="loginBtn">Login</button>
        </form>

        <p id="message"></p>

        <div class="register-link">
            Don't have an account? <a onclick="goToRegister()">Register here</a>
        </div>

    </div>

    <script>

        $("#eye").click(function(){

            let password = $("#password");

            if(password.attr("type") === "password"){

                password.attr("type","text");

                $("#eye")
                .removeClass("fa-eye")
                .addClass("fa-eye-slash");
            }

            else{

                password.attr("type","password");

                $("#eye")
                .removeClass("fa-eye-slash")
                .addClass("fa-eye");
            }
        });

        $("#loginForm").on("submit", function(e){
            e.preventDefault();
            
            let username = $("#username").val().trim();
            let password = $("#password").val().trim();
            let $message = $("#message");

            // Client-side validation
            if(username === "" || password === ""){
                $message.html("All fields are required!");
                $message.css("color", "red");
                $message.show();
                return;
            }

            if(password.length < 3){
                $message.html("Password must be at least 3 characters!");
                $message.css("color", "red");
                $message.show();
                return;
            }

            // Submit form to login.php
            $.ajax({
                type: "POST",
                url: "login.php",
                data: {
                    username: username,
                    password: password
                },
                dataType: "json",
                success: function(response) {
                    if(response.success) {
                        // Store in localStorage and redirect
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('username', response.username);
                        localStorage.setItem('user_id', response.user_id);
                        
                        $message.html("Login successful! Redirecting...");
                        $message.css("color", "green");
                        $message.show();
                        
                        setTimeout(function() {
                            window.location.href = 'index.html';
                        }, 1000);
                    } else {
                        $message.html(response.error || "Login failed!");
                        $message.css("color", "red");
                        $message.show();
                    }
                },
                error: function(xhr) {
                    let errorMsg = "Login error. Please try again.";
                    try {
                        let response = JSON.parse(xhr.responseText);
                        errorMsg = response.error || errorMsg;
                    } catch(e) {}
                    
                    $message.html(errorMsg);
                    $message.css("color", "red");
                    $message.show();
                }
            });
        });

        function goToRegister(){
            window.location.href = 'register page.html';
        }

    </script>

</body>
</html>
